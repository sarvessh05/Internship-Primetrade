version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: warehouse_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: warehouse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: warehouse_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/warehouse
      - JWT_SECRET=change-this-to-a-very-secure-random-key-in-production
      - JWT_EXPIRE_DAYS=7
      - ADMIN_SECRET=warehouse-admin-2024
    ports:
      - "8000:8000"
    depends_on:
      - db
    # Wait for the DB service to start up, run migrations, then start uvicorn
    command: sh -c "sleep 3 && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api/v1
    container_name: warehouse_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
